name: Release Windows Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Release Windows Artifacts
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Ensure 7-Zip is available
        shell: pwsh
        run: |
          $sevenZipDir = "C:\Program Files\7-Zip"
          if (!(Test-Path $sevenZipDir)) {
            choco install 7zip -y
          }
          Add-Content -Path $env:GITHUB_PATH -Value $sevenZipDir
          & "$sevenZipDir\7z.exe" | Out-Null

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Install build dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python -m pip install --upgrade pip setuptools wheel
          .\.venv\Scripts\python -m pip install -r requirements.txt
          .\.venv\Scripts\python -m pip install cx-freeze==8.5.1 nuitka zstandard

      - name: Validate tag version against source version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $sourceVersion = .\.venv\Scripts\python -c "from pathlib import Path; print(next(line.split('=', 1)[1].strip().strip(chr(34)+chr(39)) for line in Path('src/common.py').read_text(encoding='utf-8').splitlines() if line.strip().startswith('APP_VERSION')))"
          if (-not $sourceVersion) {
            throw "Unable to read APP_VERSION from src/common.py"
          }
          if ($tagVersion -ne $sourceVersion) {
            throw "Tag version v$tagVersion does not match APP_VERSION $sourceVersion"
          }
          "APP_VERSION=$sourceVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build cx_Freeze release archive
        shell: pwsh
        run: .\.venv\Scripts\python scripts\build_cx.py --use-venv

      - name: Build Nuitka executable
        shell: pwsh
        run: .\.venv\Scripts\python scripts\build_nuitka.py --use-venv

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          $archiveName = "PST_standalone_v${env:APP_VERSION}.7z"
          $nuitkaName = "PalworldSaveTools_v${env:APP_VERSION}.exe"
          $nuitkaExe = Get-ChildItem -Path ".build" -Recurse -Filter "*.exe" |
            Where-Object { $_.Directory.Name -like "*.dist" } |
            Select-Object -First 1
          if (-not $nuitkaExe) {
            throw "Unable to locate Nuitka executable under .build"
          }
          Copy-Item $archiveName "release-assets\$archiveName" -Force
          Copy-Item $nuitkaExe.FullName "release-assets\$nuitkaName" -Force

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/PST_standalone_v${{ env.APP_VERSION }}.7z
            release-assets/PalworldSaveTools_v${{ env.APP_VERSION }}.exe
